# ==============================================================================
#  Human Dataset Refiner — Docker Compose
#
#  Usage:
#    Dev mode (hot reload):  docker compose up --build
#    GPU mode:               docker compose --profile gpu up --build
#    Prod UI (Nginx):        docker compose --profile prod up --build
# ==============================================================================

services:
  refiner:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: human-dataset-refiner
    ports:
      - "8000:8000"
    volumes:
      - ./data:/app/data
      - ./models:/app/models
    environment:
      - REFINER_BLUR_THRESHOLD=35.0
      - REFINER_MIN_RESOLUTION=64
      - REFINER_PHASH_THRESHOLD=8
      - REFINER_FACE_DISTANCE_THRESHOLD=0.55
      - REFINER_CLIP_DISTANCE_THRESHOLD=0.5
      - REFINER_BATCH_SIZE=32
      - REFINER_CLIP_MODEL_NAME=ViT-B-32
      - REFINER_CLIP_PRETRAINED=laion2b_s34b_b79k
      - REFINER_INSIGHTFACE_MODEL=buffalo_l
      - REFINER_DATA_DIR=/app/data
    restart: unless-stopped

  # Dev UI — Vite hot reload (default)
  ui:
    build:
      context: ./ui
      dockerfile: Dockerfile
      target: dev
    container_name: human-dataset-refiner-ui
    ports:
      - "3000:3000"
    volumes:
      - ./ui/src:/app/src
      - ./ui/index.html:/app/index.html
    depends_on:
      - refiner
    restart: unless-stopped

  # Production UI — Nginx (opt-in via --profile prod)
  ui-prod:
    build:
      context: ./ui
      dockerfile: Dockerfile
      target: prod
    container_name: human-dataset-refiner-ui-prod
    profiles:
      - prod
    ports:
      - "3000:80"
    depends_on:
      - refiner
    restart: unless-stopped

  # GPU-enabled variant (activate with --profile gpu)
  refiner-gpu:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: human-dataset-refiner-gpu
    profiles:
      - gpu
    ports:
      - "8000:8000"
    volumes:
      - ./data:/app/data
      - ./models:/app/models
    environment:
      - REFINER_BLUR_THRESHOLD=35.0
      - REFINER_MIN_RESOLUTION=64
      - REFINER_PHASH_THRESHOLD=8
      - REFINER_FACE_DISTANCE_THRESHOLD=0.55
      - REFINER_CLIP_DISTANCE_THRESHOLD=0.5
      - REFINER_BATCH_SIZE=64
      - REFINER_CLIP_MODEL_NAME=ViT-B-32
      - REFINER_CLIP_PRETRAINED=laion2b_s34b_b79k
      - REFINER_INSIGHTFACE_MODEL=buffalo_l
      - REFINER_DATA_DIR=/app/data
    restart: unless-stopped
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
